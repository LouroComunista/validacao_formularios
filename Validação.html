<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro Tela Cheia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        
        body {
            background-color: #121212;
            margin: 0;
            padding: 20px; 
        }

        
        .form-control {
            border: 1px solid #3d4246;
            border-radius: 8px;
            padding: 12px;
            transition: all 0.3s shadow;
        }

        
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
            background-color: #1e1e1e;
        }

        .main-wrapper {
            border: 1px solid #2d2d2d; 
            border-radius: 15px;
            padding: 40px;
            background-color: #1b1e21;
        }
    </style>
</head>
<body>

    <div class="container-fluid bg-secondary-subtle full-screen-container shadow-none">
        <h1 class="mb-5 text-center">Formulário</h1>

        <form class="row g-4" id="formCadastro" novalidate>
            
            <div class="col-12">
                <label for="nome" class="form-label fw-bold">Nome Completo</label>
                <input type="text" class="form-control" id="nome" required>
            </div>

            <div class="col-12">
                <label for="cpf" class="form-label fw-bold">CPF</label>
                <input type="text" class="form-control" id="cpf" maxlength="11" placeholder="000.000.000-00" required>
                <div class="invalid-feedback">Minimo de 11 digitos</div>
            </div>

            <div class="col-12">
                <label for="cep" class="form-label fw-bold">CEP</label>
                <div class="input-group">
                    <span class="input-group-text bg-primary text-white border-primary">CEP</span>
                    <input type="text" class="form-control" id="cep" maxlength="9" required>
                </div>
            </div>

            <div class="col-12">
                <label for="logradouro" class="form-label fw-bold">Logradouro (Rua/Avenida)</label>
                <input type="text" class="form-control" id="logradouro" required>
            </div>

            <div class="col-12">
                <label for="bairro" class="form-label fw-bold">Bairro</label>
                <input type="text" class="form-control" id="bairro" required>
            </div>

            <div class="col-12">
                <label for="cidade" class="form-label fw-bold">Cidade</label>
                <input type="text" class="form-control" id="cidade" required>
            </div>

            <div class="col-12">
                <label for="estado" class="form-label fw-bold">Estado (UF)</label>
                <input type="text" class="form-control" id="estado" maxlength="2" required>
            </div>

            <div class="col-12">
                <label for="numero" class="form-label fw-bold">Número</label>
                <input type="text" class="form-control" id="numero" maxlength="5" inputmode="numeric" required>
            </div>

            <div class="col-12">
                <label for="complemento" class="form-label fw-bold">Complemento</label>
                <input type="text" class="form-control" id="complemento">
            </div>

            <div class="col-12 mt-5">
                <button class="btn btn-primary btn-lg w-100" type="submit">Finalizar</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const form = document.getElementById('formCadastro');
        const cepInput = document.getElementById('cep');
        const cpfInput = document.getElementById('cpf');

cpfInput.addEventListener('input', function() {
    
    this.value = this.value.replace(/\D/g, '');

   
    if (this.value.length > 0 && this.value.length < 11) {
      
        this.classList.add('is-invalid');
        this.classList.remove('is-valid');
    } else if (this.value.length === 11) {
    
        this.classList.remove('is-invalid');
        this.classList.add('is-valid');
    } else {
       
        this.classList.remove('is-invalid');
        this.classList.remove('is-valid');
    }
});


const inputNumero = document.getElementById('numero');

    inputNumero.addEventListener('input', function() {
        
        this.value = this.value.replace(/\D/g, '');
    });

       
        cepInput.addEventListener('input', function() {
            let v = this.value.replace(/\D/g, '');
            if (v.length > 5) v = v.replace(/^(\d{5})(\d)/, "$1-$2");
            this.value = v;
            this.classList.remove('is-invalid');
        });

        
        cepInput.addEventListener('blur', function() {
            let cep = this.value.replace(/\D/g, '');
            if (cep.length === 8) {
                fetch(`https://viacep.com.br/ws/${cep}/json/`)
                    .then(res => res.json())
                    .then(dados => {
                        if (!("erro" in dados)) {
                            document.getElementById('logradouro').value = dados.logradouro;
                            document.getElementById('bairro').value = dados.bairro;
                            document.getElementById('cidade').value = dados.localidade;
                            document.getElementById('estado').value = dados.uf;
                            cepInput.classList.remove('is-invalid');
                        } else {
                            alert("CEP não encontrado!");
                            cepInput.classList.add('is-invalid');
                        }
                    });
            }
        });

        
        form.addEventListener('submit', function(event) {
            let valid = true;

            if (cpfInput.value.length !== 11) {
                cpfInput.classList.add('is-invalid');
                valid = false;
            }

          
            if (cepInput.value.replace(/\D/g, '').length !== 8) {
                cepInput.classList.add('is-invalid');
                valid = false;
            }

            if (!form.checkValidity() || !valid) {
                event.preventDefault();
                event.stopPropagation();
            }

            form.classList.add('was-validated');
        }, false);
    </script>


</body>
</html>
